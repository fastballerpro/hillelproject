{% extends "base.html" %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Create note</h2>
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Back</a>
  </div>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input name="name" class="form-control" required value="{{ name }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Content</label>
      <textarea name="content" class="form-control" rows="6" required>{{ content }}</textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Image (optional)</label>
      <input name="image" type="file" class="form-control" accept="image/*">
    </div>

    <button class="btn btn-primary" type="submit">Save</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
